name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run package -- --out kiro-stat.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: kiro-stat-vsix
          path: kiro-stat.vsix
