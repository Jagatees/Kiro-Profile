name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: mv kiro-stat-*.vsix kiro-stat-${{ github.ref_name }}.vsix
      - uses: softprops/action-gh-release@v2
        with:
          files: kiro-stat-${{ github.ref_name }}.vsix
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish kiro-stat-${{ github.ref_name }}.vsix -p "$OVSX_PAT"
